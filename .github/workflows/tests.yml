name: Testy Jednostkowe Qt

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:

    runs-on: ubuntu-24.04

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Instalacja Qt6 i zaleznosci (Systemowo)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-charts-dev \
            cmake \
            make \
            g++ \
            xvfb \
            libgl1-mesa-dev

      - name: Konfiguracja projektu
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Budowanie projektu
        run: |
          cd build
          make

      - name: Uruchomienie testów (XVFB)
        run: |
          cd build
      
          xvfb-run --auto-servernum ./test_pingapka
