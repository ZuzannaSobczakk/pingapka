
name: Testy Jednostkowe Qt

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Instalacja zaleznosci systemowych
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-shape0 \
            libfontconfig1 libdbus-1-3 xvfb

      - name: Instalacja Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          arch: 'gcc_64'
          modules: 'qtcharts'
          # Wylaczamy cache tymczasowo, bo GitHub ma awarie:
          cache: false 

      - name: Konfiguracja i Budowanie
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Uruchomienie testów (przez XVFB)
        run: |
          cd build
          xvfb-run --auto-servernum ctest --output-on-failure
